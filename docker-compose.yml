# ─────────────────────────────────────────────────────────────
#  RetiScan — Orquestación Global de Infraestructura
#  Servicios: api, db, landing-page, pwa, adminer
# ─────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: retiscan_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB:       ${DB_NAME:-retiscan}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./api/config/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-retiscan}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ──────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: retiscan_api
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  # ── Landing Page (React/Vite) ────────────────────────────────
  landing-page:
    build:
      context: ./page
      dockerfile: Dockerfile
    container_name: retiscan_landing
    restart: unless-stopped
    ports:
      - "5173:80"

  # ── PWA (Flutter) ────────────────────────────────────────────
  pwa:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: retiscan_pwa
    restart: unless-stopped
    ports:
      - "5174:80"

  # ── Adminer (DB GUI) ─────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: retiscan_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy

  # ── AI Algorithms (Python) ───────────────────────────────────
  algorithms:
    build:
      context: ./algorithms
      dockerfile: Dockerfile
    container_name: retiscan_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./api/uploads:/app/uploads

volumes:
  pg_data:
    name: retiscan_pg_data
